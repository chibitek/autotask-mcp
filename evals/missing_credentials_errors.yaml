name: test_connection returns clear error when credentials missing
server:
  command: node
  args: [dist/entry.js]
  env:
    AUTOTASK_USERNAME: ""
    AUTOTASK_SECRET: ""
    AUTOTASK_INTEGRATION_CODE: ""
assert:
  tool: autotask_test_connection
  args: {}
  expect:
    is_error: true
    contains: ["credential"]
timeout: 30s
