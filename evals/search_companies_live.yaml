name: search_companies returns results against live API
server:
  command: node
  args: [dist/entry.js]
  env:
    AUTOTASK_USERNAME: "${AUTOTASK_USERNAME}"
    AUTOTASK_SECRET: "${AUTOTASK_SECRET}"
    AUTOTASK_INTEGRATION_CODE: "${AUTOTASK_INTEGRATION_CODE}"
assert:
  tool: autotask_search_companies
  args:
    pageSize: 5
  expect:
    not_error: true
    not_empty: true
timeout: 60s
